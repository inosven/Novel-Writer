appId: com.novelwriter.app
productName: AI Novel Writer
copyright: Copyright © 2025

directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: templates/
    to: templates/
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/vectordb/**"
  - "**/@lancedb/**"
  - "**/apache-arrow/**"

win:
  target:
    - target: dir
      arch:
        - x64
  # icon: resources/icon.ico  # Uncomment when icon is available
  artifactName: ${productName}-${version}-win-${arch}
  signAndEditExecutable: false
  forceCodeSigning: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  # icon: resources/icon.icns  # Uncomment when icon is available
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  # entitlements: resources/entitlements.mac.plist  # Uncomment when entitlements file is available
  # entitlementsInherit: resources/entitlements.mac.plist

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  # icon: resources/icons  # Uncomment when icons are available
  category: Office
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  maintainer: novelwriter@example.com

appImage:
  artifactName: ${productName}-${version}.${ext}

deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

publish:
  provider: generic
  url: https://example.com/releases/
